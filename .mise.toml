[tools]
hugo = "0.160.1"
wrangler = "4.83.0"

[tasks.install]
run = "mise install"

[tasks.build]
run = "hugo --gc --minify --cleanDestinationDir --destination dist"

[tasks.dev]
run = "mise run build && wrangler dev"

[tasks.check]
run = "mise run build"

[tasks.deploy]
run = "mise run build && wrangler deploy"
