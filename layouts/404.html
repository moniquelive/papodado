{{ define "main" }}
<section>
  <h1>Pagina nao encontrada</h1>
  <p>O caminho <code id="missing-path">desconhecido</code> nao existe.</p>
  <p><a href="{{ "/" | relURL }}">Voltar para a pagina inicial</a></p>
</section>
{{- with resources.Get "js/404-path.js" -}}
  {{- $notFoundScript := . | minify | fingerprint -}}
<script src="{{ $notFoundScript.RelPermalink }}" integrity="{{ $notFoundScript.Data.Integrity }}" defer></script>
{{- end -}}
{{ end }}
