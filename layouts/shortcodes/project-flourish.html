<section data-project-stage>
  <h2>{{ .Get "heading" }}</h2>
  <p>{{ .Get "description" }}</p>
  <div data-flourish-wrapper>
    <div class="flourish-embed flourish-chart" data-src="{{ .Get "source" }}">
      <script src="https://public.flourish.studio/resources/embed.js"></script>
      <noscript>
        <img
          src="{{ .Get "thumbnail" }}"
          width="100%"
          alt="{{ .Get "alt" }}"
        >
      </noscript>
    </div>
  </div>
</section>
